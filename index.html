<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors Game</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    
    <link rel ="stylesheet" href ="./style.css">
    <script src="script.js" defer></script>
</head>

<body>
    <nav class="navbar bg-body-tertiary">
  <form class="container-fluid justify-content-start">
    <button class="btn btn-outline-success me-2" type="button">RULES</button>
    <button class="btn btn-outline-success me-2" type="button">ROCK PAPER SCISSORS</button>
  </form>
</nav>

<section>
 <div class ="card">
    <h1>!..Rock Paper Scissors..!</h1>
    <p>You vs Computer</p>
    <div class = "actions">
      <div><img id="Rock" width="100px" src="./Images/rock" alt="Rock"></div>
      <div><img id="Paper" width="100px" src="./Images/paper.png" alt="Paper"></div>
      <div><img id="Scissors" width="100px" src= "./Images/Scissors" alt="Scissors"></div>
    </div>

  <div class = "results">
    <h3>Results!</h3>
    <div id="choices">
    <p class = "User-pick" id="playerResult"></p>
    <p class = "Computer-pick" id="computersResult"></p>
    </div>

    <div id="choices">
      <p id="playerWins"></p>
      <p id="computerWins"></p>
    </div>

    <p class = "Summary" id="summary"></p>
  <div class = "display" id="winnerBackground">
    <h4 class = "display-heading" id="winner">N/A</h4>
  </div>
 </div>
</div>
</section>

<footer class="site-footer">
    <p class ="footer-text">
         copyright @ 2026 
            Jim & Sania 
    </p>
</footer>
</body>
</html>
